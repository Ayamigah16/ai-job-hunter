# Company registry — DATA, not code. Add companies here; no src/ changes needed.
#
# Every board_token below was live-verified against the source API on 2026-07-05
# (see docs/adr/0002-ats-adapter-abstraction.md once Phase 2 lands). When adding a
# new entry, verify the token yourself first — generic slugs can silently 404 or,
# worse, resolve to an unrelated company of the same name on the same ATS.
#
# ats_type: unsupported means the company is tracked (e.g. for the Target
# Companies sheet) but its real ATS (Workday, Teamtailor, in-house, ...) has no
# adapter yet — see the `notes` field for what it actually uses.

