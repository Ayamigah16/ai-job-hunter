  source_type: remoteok
  enabled: true
  search_terms: [devops, platform, sre, "site reliability", kubernetes, cloud, infrastructure]

- name: Arbeitnow
  source_type: arbeitnow
  enabled: true
  search_terms: [devops, platform, sre, kubernetes, cloud, infrastructure]

- name: Remotive
  source_type: remotive
